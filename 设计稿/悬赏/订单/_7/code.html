<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SunnyPlay - 立即抢单</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#feb246",
              "outline-variant": "#acadad",
              "on-error": "#ffefec",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#ffc69a",
              "on-tertiary-fixed-variant": "#623d00",
              "secondary": "#8c4a00",
              "on-surface": "#2d2f2f",
              "on-tertiary-fixed": "#3a2300",
              "secondary-fixed-dim": "#ffb375",
              "surface-dim": "#d3d5d5",
              "tertiary-container": "#feb246",
              "secondary-dim": "#7b4000",
              "secondary-container": "#ffc69a",
              "primary-container": "#ffd709",
              "surface-tint": "#6c5a00",
              "on-error-container": "#520c00",
              "inverse-on-surface": "#9c9d9d",
              "on-primary-container": "#5b4b00",
              "on-secondary": "#fff0e7",
              "on-surface-variant": "#5a5c5c",
              "inverse-surface": "#0c0f0f",
              "surface-container-high": "#e1e3e3",
              "background": "#f6f6f6",
              "primary-fixed": "#ffd709",
              "surface": "#f6f6f6",
              "tertiary": "#805100",
              "error-container": "#f95630",
              "error-dim": "#b92902",
              "on-secondary-fixed-variant": "#7c4100",
              "surface-container-highest": "#dbdddd",
              "on-tertiary": "#fff0e3",
              "primary-dim": "#5e4e00",
              "surface-bright": "#f6f6f6",
              "primary-fixed-dim": "#efc900",
              "on-secondary-fixed": "#532a00",
              "on-secondary-container": "#6f3a00",
              "primary": "#6c5a00",
              "error": "#b02500",
              "on-primary-fixed": "#453900",
              "surface-variant": "#dbdddd",
              "on-tertiary-container": "#563500",
              "outline": "#767777",
              "tertiary-dim": "#704700",
              "tertiary-fixed-dim": "#eea439",
              "on-background": "#2d2f2f",
              "surface-container": "#e7e8e8",
              "on-primary": "#fff2cd",
              "inverse-primary": "#ffd709",
              "surface-container-low": "#f0f1f1",
              "on-primary-fixed-variant": "#665500"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Be Vietnam Pro"],
              "label": ["Be Vietnam Pro"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .headline-font { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Top Navigation Anchor -->
<header class="w-full top-0 sticky z-50 bg-[#f6f6f6] dark:bg-neutral-900 transition-colors">
<div class="flex items-center justify-between px-5 py-3 w-full max-w-md mx-auto">
<div class="flex items-center gap-3">
<button class="active:scale-95 transition-transform duration-200 text-[#6c5a00]">
<span class="material-symbols-outlined">arrow_back_ios</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg tracking-tight text-[#6c5a00]">立即抢单</h1>
</div>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-sm">help</span>
</div>
</div>
<div class="bg-neutral-200/50 dark:bg-neutral-800/50 h-[1px] w-full"></div>
</header>
<main class="max-w-md mx-auto px-5 py-6 space-y-6">
<!-- Task Overview Section: Bento Style Card -->
<section class="space-y-3">
<h2 class="headline-font font-bold text-xl px-1">悬赏任务简述</h2>
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-sm border border-outline-variant/10">
<div class="flex justify-between items-start mb-4">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-xl bg-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<div>
<p class="font-bold text-lg">王者荣耀</p>
<p class="text-on-surface-variant text-sm">排位赛 · 连胜上分</p>
</div>
</div>
<div class="text-right">
<p class="text-primary font-bold text-xl headline-font">¥50.00</p>
<p class="text-on-surface-variant text-xs">预计 45 分钟</p>
</div>
</div>
<div class="flex flex-wrap gap-2 pt-2 border-t border-surface-container-high">
<span class="bg-tertiary-container/20 text-on-tertiary-container px-3 py-1 rounded-full text-[10px] font-bold">需要麦克风</span>
<span class="bg-secondary-container/20 text-on-secondary-container px-3 py-1 rounded-full text-[10px] font-bold">不送人头</span>
<span class="bg-primary-container/20 text-on-primary-container px-3 py-1 rounded-full text-[10px] font-bold">星耀段位+</span>
</div>
</div>
</section>
<!-- Self-Recommendation Section -->
<section class="space-y-3">
<div class="flex items-center justify-between px-1">
<h2 class="headline-font font-bold text-xl">大神自我推荐</h2>
<span class="text-xs text-on-surface-variant">必填项</span>
</div>
<div class="relative">
<textarea class="w-full bg-surface-container-high border-none rounded-xl p-4 text-sm focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest min-h-[120px] transition-all" placeholder="例如：国服韩信，胜率85%，声音好听会聊天，带飞全场..."></textarea>
<div class="absolute bottom-3 right-4 flex gap-2">
<button class="bg-surface-container-lowest hover:bg-surface-container-high transition-colors px-2 py-1 rounded-lg text-[10px] font-bold text-primary-dim border border-primary-container/30">快速填充模板</button>
</div>
</div>
<div class="grid grid-cols-2 gap-3 mt-2">
<div class="bg-surface-container-low p-3 rounded-xl flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary text-lg">mic</span>
<span class="text-xs font-semibold">语音试听</span>
</div>
<div class="bg-surface-container-low p-3 rounded-xl flex items-center gap-2 active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary text-lg">image</span>
<span class="text-xs font-semibold">上传战绩</span>
</div>
</div>
</section>
<!-- Departure Time Selection -->
<section class="space-y-3">
<h2 class="headline-font font-bold text-xl px-1">预计出发时间</h2>
<div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
<label class="flex-shrink-0 cursor-pointer group">
<input checked="" class="hidden" name="time" type="radio"/>
<div class="bg-primary-container text-on-primary-container px-6 py-4 rounded-xl flex flex-col items-center justify-center min-w-[100px] border-2 border-primary group-has-[:checked]:border-primary transition-all">
<span class="text-sm font-bold">立即</span>
<span class="text-[10px] opacity-80">ASAP</span>
</div>
</label>
<label class="flex-shrink-0 cursor-pointer group">
<input class="hidden" name="time" type="radio"/>
<div class="bg-surface-container-lowest text-on-surface-variant px-6 py-4 rounded-xl flex flex-col items-center justify-center min-w-[100px] border-2 border-transparent group-has-[:checked]:border-primary group-has-[:checked]:bg-primary-container group-has-[:checked]:text-on-primary-container transition-all">
<span class="text-sm font-bold">5分钟后</span>
<span class="text-[10px] opacity-80">Soon</span>
</div>
</label>
<label class="flex-shrink-0 cursor-pointer group">
<input class="hidden" name="time" type="radio"/>
<div class="bg-surface-container-lowest text-on-surface-variant px-6 py-4 rounded-xl flex flex-col items-center justify-center min-w-[100px] border-2 border-transparent group-has-[:checked]:border-primary group-has-[:checked]:bg-primary-container group-has-[:checked]:text-on-primary-container transition-all">
<span class="text-sm font-bold">10分钟后</span>
<span class="text-[10px] opacity-80">Later</span>
</div>
</label>
</div>
</section>
<!-- Confirmation Notice -->
<div class="bg-secondary-container/10 p-4 rounded-xl flex gap-3">
<span class="material-symbols-outlined text-secondary text-lg">info</span>
<p class="text-xs text-on-secondary-container leading-relaxed">
                温馨提示：抢单成功后请及时通过聊天工具与雇主沟通，逾期未开始可能影响您的信用评分。
            </p>
</div>
</main>
<!-- Fixed Action Button Area -->
<div class="fixed bottom-0 left-0 w-full bg-white/80 dark:bg-neutral-900/80 backdrop-blur-xl px-6 pb-10 pt-4 z-50 rounded-t-[1.5rem] shadow-[0_-4px_20px_0_rgba(0,0,0,0.05)]">
<div class="max-w-md mx-auto space-y-4">
<div class="flex items-center justify-between text-sm px-2">
<span class="text-on-surface-variant">诚意金抵扣</span>
<span class="font-bold text-primary">- ¥1.50</span>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-bold py-4 rounded-full text-lg shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">bolt</span>
                确认抢单
            </button>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary-container/20 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-40 -left-20 w-48 h-48 bg-secondary-container/20 rounded-full blur-3xl -z-10"></div>
</body></html>
