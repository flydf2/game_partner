<body class="font-body selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar Shell (Transactional Variant: Hide Nav, Show Back) -->
<header class="flex justify-between items-center px-5 h-16 w-full fixed top-0 z-50 bg-surface-container-highest/50 backdrop-blur-xl">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg text-primary">绑定手机</h1>
<div class="w-10"></div> <!-- Placeholder to center title -->
</header>
<main class="pt-24 pb-12 px-6 flex flex-col min-h-screen max-w-md mx-auto">
<!-- Brand Narrative / Header Section -->
<section class="mb-10 mt-4">
<div class="inline-flex items-center justify-center p-4 bg-primary-container rounded-3xl mb-6 shadow-sm">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="phonelink_setup">phonelink_setup</span>
</div>
<h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface mb-2">安全加固</h2>
<p class="text-on-surface-variant leading-relaxed opacity-80">绑定手机号，开启您的 SunnyPlay 活力社交之旅，实时获取陪玩动态。</p>
</section>
<!-- Functional Bento Form Area -->
<div class="space-y-6">
<!-- Input Group: Phone Number -->
<div class="group">
<label class="block font-label text-xs font-semibold text-on-surface-variant mb-2 px-1">手机号码</label>
<div class="flex items-center bg-surface-container-high rounded-2xl p-4 transition-all focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary-container">
<span class="material-symbols-outlined text-outline-variant mr-3" data-icon="smartphone">smartphone</span>
<span class="text-on-surface font-medium mr-3">+86</span>
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-on-surface placeholder:text-outline-variant font-medium" placeholder="请输入11位手机号" type="tel"/>
</div>
</div>
<!-- Input Group: OTP -->
<div class="group">
<label class="block font-label text-xs font-semibold text-on-surface-variant mb-2 px-1">验证码</label>
<div class="flex gap-3">
<div class="flex-grow flex items-center bg-surface-container-high rounded-2xl p-4 transition-all focus-within:bg-surface-container-lowest focus-within:ring-2 focus-within:ring-primary-container">
<span class="material-symbols-outlined text-outline-variant mr-3" data-icon="shield_lock">shield_lock</span>
<input class="bg-transparent border-none p-0 w-full focus:ring-0 text-on-surface placeholder:text-outline-variant font-medium" placeholder="6位验证码" type="number"/>
</div>
<button class="bg-secondary-container text-on-secondary-container font-headline font-bold text-sm px-5 py-4 rounded-2xl whitespace-nowrap active:scale-95 transition-transform hover:opacity-90">
                        获取验证码
                    </button>
</div>
</div>
</div>
<!-- Submit Section -->
<section class="mt-12 flex flex-col gap-6">
<button class="w-full py-5 bg-primary-container text-on-primary-container font-headline font-extrabold text-lg rounded-full shadow-[0_12px_24px_-8px_rgba(255,215,0,0.4)] active:scale-[0.98] active:bg-primary-dim transition-all flex items-center justify-center gap-2">
                确认绑定
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
<p class="text-center text-[11px] text-on-surface-variant px-8 leading-relaxed opacity-60">
                绑定即代表您已阅读并同意 
                <span class="text-secondary font-semibold">《用户服务协议》</span> 与 
                <span class="text-secondary font-semibold">《隐私政策》</span>
</p>
</section>
<!-- Decorative Element -->
