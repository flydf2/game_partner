</div>
</div>
<div class="flex-1 min-w-0">
<h2 class="font-headline font-bold text-lg truncate">星野Kyo</h2>
<div class="flex items-center gap-2 mt-1">
<span class="text-xs font-medium px-2 py-0.5 bg-secondary-container text-on-secondary-container rounded-full">英雄联盟</span>
<span class="text-xs text-on-surface-variant">服务时长: 2小时</span>
</div>
</div>
</section>

<!-- 综合评分 -->
<div class="text-center space-y-3">
<h3 class="font-headline font-bold text-sm tracking-widest text-on-surface-variant uppercase">综合评分</h3>
<div class="flex justify-center gap-3">
<span class="material-symbols-outlined text-4xl text-primary filled-icon cursor-pointer active:scale-110 transition-transform">star</span>
<span class="material-symbols-outlined text-4xl text-primary filled-icon cursor-pointer active:scale-110 transition-transform">star</span>
<span class="material-symbols-outlined text-4xl text-primary filled-icon cursor-pointer active:scale-110 transition-transform">star</span>
<span class="material-symbols-outlined text-4xl text-primary filled-icon cursor-pointer active:scale-110 transition-transform">star</span>
<span class="material-symbols-outlined text-4xl text-outline-variant cursor-pointer active:scale-110 transition-transform">star</span>
</div>
<p class="text-primary font-bold text-lg">非常好 (4.0)</p>
</div>
<!-- 维度评价 -->

<div class="flex items-center justify-between">
<span class="text-sm font-medium w-16">技术</span>
<div class="flex-1 h-2 bg-surface-container-high rounded-full mx-4 overflow-hidden">

<div class="flex-1 h-2 bg-surface-container-high rounded-full mx-4 overflow-hidden">

</div>
</div>

<div class="grid grid-cols-3 gap-3">

<div class="aspect-square bg-surface-container-high rounded-2xl flex items-center justify-center cursor-pointer hover:bg-surface-container-highest transition-colors active:scale-95 border-2 border-dashed border-outline-variant/30">
