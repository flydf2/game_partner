<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tap-highlight-none {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
        .animate-pulse-subtle {
            animation: pulse-subtle 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "error": "#b02500",
                "surface-container-high": "#e1e3e3",
                "on-primary": "#fff2cd",
                "surface-container-highest": "#dbdddd",
                "on-surface": "#2d2f2f",
                "tertiary-container": "#feb246",
                "on-secondary": "#fff0e7",
                "surface-container-low": "#f0f1f1",
                "primary-fixed-dim": "#efc900",
                "on-primary-fixed-variant": "#665500",
                "inverse-surface": "#0c0f0f",
                "surface-bright": "#f6f6f6",
                "surface-tint": "#6c5a00",
                "tertiary": "#805100",
                "secondary-fixed-dim": "#ffb375",
                "surface-variant": "#dbdddd",
                "on-background": "#2d2f2f",
                "primary": "#6c5a00",
                "on-surface-variant": "#5a5c5c",
                "secondary-container": "#ffc69a",
                "secondary": "#8c4a00",
                "on-tertiary": "#fff0e3",
                "secondary-fixed": "#ffc69a",
                "on-secondary-container": "#6f3a00",
                "inverse-primary": "#ffd709",
                "primary-container": "#ffd709",
                "on-error-container": "#520c00",
                "surface-container-lowest": "#ffffff",
                "error-container": "#f95630",
                "on-tertiary-container": "#563500",
                "surface-container": "#e7e8e8",
                "background": "#f6f6f6",
                "tertiary-dim": "#704700",
                "surface": "#f6f6f6",
                "primary-fixed": "#ffd709",
                "tertiary-fixed": "#feb246",
                "primary-dim": "#5e4e00",
                "on-primary-fixed": "#453900",
                "on-primary-container": "#5b4b00",
                "on-secondary-fixed-variant": "#7c4100",
                "error-dim": "#b92902",
                "on-error": "#ffefec",
                "secondary-dim": "#7b4000",
                "on-secondary-fixed": "#532a00",
                "tertiary-fixed-dim": "#eea439",
                "outline-variant": "#acadad",
                "on-tertiary-fixed-variant": "#623d00",
                "surface-dim": "#d3d5d5",
                "outline": "#767777",
                "on-tertiary-fixed": "#3a2300",
                "inverse-on-surface": "#9c9d9d"
              },
              fontFamily: {
                "headline": ["Plus Jakarta Sans"],
                "body": ["Be Vietnam Pro"],
                "label": ["Be Vietnam Pro"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body min-h-screen pb-24">
<!-- TopAppBar -->
<nav class="bg-[#f6f6f6] dark:bg-neutral-900 w-full top-0 sticky z-50">
<div class="flex items-center justify-between px-5 h-16 w-full max-w-md mx-auto">
<div class="flex items-center gap-3">
<button class="text-[#6c5a00] active:scale-95 duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold text-lg text-[#6c5a00] dark:text-[#FFD700]">收益提现</h1>
</div>
<button class="text-[#6c5a00] text-sm font-semibold active:scale-95 duration-200">
                提现记录
            </button>
</div>
<div class="bg-neutral-200/50 dark:bg-neutral-800/50 h-[1px] w-full"></div>
</nav>
<main class="max-w-md mx-auto px-5 pt-8 space-y-8">
<!-- Balance Section -->
<section class="relative overflow-hidden bg-primary-container rounded-[2rem] p-8 flex flex-col items-center justify-center text-on-primary-container">
<!-- Decorative Element -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-white/20 rounded-full blur-3xl"></div>
<p class="text-sm font-medium opacity-80 mb-2">当前可提现余额 (元)</p>
<div class="flex items-baseline gap-1">
<span class="text-2xl font-headline font-bold">¥</span>
<span class="text-5xl font-headline font-black tracking-tight">12,850.00</span>
</div>
<div class="mt-6 px-4 py-1.5 bg-on-primary-container/10 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-bold tracking-wider uppercase">安全提现保障中</span>
</div>
</section>
<!-- Withdrawal Amount Input -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface-variant px-1">提现金额</h2>
<div class="bg-surface-container-lowest rounded-2xl p-6 transition-all focus-within:ring-2 focus-within:ring-primary-container">
<div class="flex items-center gap-3 pb-4">
<span class="text-3xl font-headline font-bold text-on-surface">¥</span>
<input class="w-full bg-transparent border-none p-0 text-3xl font-headline font-bold placeholder:text-surface-container-high focus:ring-0" placeholder="0.00" type="number"/>
<button class="shrink-0 text-primary font-bold text-sm px-3 py-1 bg-primary-container/30 rounded-lg active:scale-95 transition-transform">全部提现</button>
</div>
<div class="pt-4 border-t border-surface-container-low flex justify-between items-center text-[12px] text-on-surface-variant">
<span>单笔最低提现 ¥10.00</span>
<span>今日剩余额度 ¥50,000</span>
</div>
</div>
</section>
<!-- Withdrawal Method Selection -->
<section class="space-y-4">
<h2 class="text-sm font-bold text-on-surface-variant px-1">提现方式</h2>
<div class="space-y-3">
<!-- Method: WeChat -->
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl cursor-pointer group active:scale-[0.98] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-[#07C160]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#07C160]" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div>
<p class="font-bold text-on-surface">微信支付</p>
<p class="text-xs text-on-surface-variant">提现至微信零钱</p>
</div>
</div>
<input checked="" class="w-6 h-6 text-primary border-surface-container-high focus:ring-primary-container" name="pay_method" type="radio"/>
</label>
<!-- Method: Alipay -->
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl cursor-pointer group active:scale-[0.98] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-[#1677FF]/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[#1677FF]" style="font-variation-settings: 'FILL' 1;">payments</span>
</div>
<div>
<p class="font-bold text-on-surface">支付宝</p>
<p class="text-xs text-on-surface-variant">提现至支付宝账号</p>
</div>
</div>
<input class="w-6 h-6 text-primary border-surface-container-high focus:ring-primary-container" name="pay_method" type="radio"/>
</label>
<!-- Method: Bank Card -->
<label class="flex items-center justify-between p-4 bg-surface-container-lowest rounded-2xl cursor-pointer group active:scale-[0.98] transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-xl bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">credit_card</span>
</div>
<div>
<p class="font-bold text-on-surface">银行卡</p>
<p class="text-xs text-on-surface-variant">预计1-3个工作日到账</p>
</div>
</div>
<input class="w-6 h-6 text-primary border-surface-container-high focus:ring-primary-container" name="pay_method" type="radio"/>
</label>
</div>
</section>
<!-- Withdrawal Tips -->
<section class="px-1 space-y-2">
<h3 class="text-[12px] font-bold text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">info</span>
                提现说明
            </h3>
<ul class="text-[11px] text-on-surface-variant/80 leading-relaxed list-disc list-inside">
<li>每笔提现将扣除 1% 的平台服务手续费。</li>
<li>单日提现上限为 5 次，总额不超过 50,000 元。</li>
<li>提现申请提交后，系统将在 24 小时内完成审核。</li>
</ul>
</section>
</main>
<!-- Confirm Button (Fixed Bottom) -->
<div class="fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto p-5 bg-background/80 backdrop-blur-lg z-40">
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-bold text-lg rounded-full shadow-[0_8px_30px_rgb(255,215,9,0.3)] active:scale-[0.97] transition-all flex items-center justify-center gap-2">
            确认提现
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="h-safe-area-inset-bottom"></div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[10%] -left-[20%] w-[80%] h-[40%] bg-primary-container/20 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[20%] -right-[10%] w-[60%] h-[30%] bg-secondary-container/20 rounded-full blur-[80px]"></div>
</div>
</body></html>
