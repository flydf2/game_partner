<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检查本地存储</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        pre { background-color: #f5f5f5; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>检查本地存储</h1>
    <pre id="storage-content"></pre>
    <button onclick="checkStorage()">检查存储</button>
    <button onclick="mockLogin()">模拟登录</button>
    <button onclick="goToProfile()">访问/profile</button>
    
    <script>
        function checkStorage() {
            const content = document.getElementById('storage-content');
            let html = '';
            html += 'token: ' + localStorage.getItem('token') + '\n';
            html += 'gamepartner_user: ' + localStorage.getItem('gamepartner_user') + '\n';
            html += 'refresh_token: ' + localStorage.getItem('refresh_token') + '\n';
            html += 'token_expiry: ' + localStorage.getItem('token_expiry') + '\n';
            content.textContent = html;
        }
        
        function mockLogin() {
            const mockToken = 'mock_token_' + Date.now();
            const mockUser = {
                id: '1000001',
                avatar: 'https://randomuser.me/api/portraits/men/32.jpg',
                nickname: '游戏达人',
                vipLevel: 3
            };
            
            localStorage.setItem('token', mockToken);
            localStorage.setItem('gamepartner_user', JSON.stringify(mockUser));
            localStorage.setItem('token_expiry', (Date.now() + 2 * 60 * 60 * 1000).toString());
            
            checkStorage();
            alert('模拟登录成功！');
        }
        
        function goToProfile() {
            window.location.href = '/profile';
        }
        
        // 页面加载时检查存储
        window.onload = checkStorage;
    </script>
</body>
</html>
